bot:
  # https://discord.com/developers/applications
  token: "TOKEN_HERE"
  prefixes:
    - "!"
    - "hi bot"
  maxChatHistoryLength: 50

lavalink:
  host: "localhost"
  port: 2333
  password: "youshallnotpass"
  secure: false    # Set to true if using SSL

openai:
  key: "KEY_HERE"
  model: "gpt-4.1"
  # Below are URLs of some OpenAI compatible APIs, uncomment which one you want to use or add your own.
#  completionsUrl: "https://api.openai.com/v1/chat/completions"  # ChatGPT, default
#  completionsUrl: "http://127.0.0.1:1234/v1/chat/completions"   # LM Studio
#  completionsUrl: "https://generativelanguage.googleapis.com/v1beta/openai/chat/completions"  # Gemini

chatbot:
  enabled: true
  systemPrompt: |
    You are a helpful and friendly Discord bot assistant.
    Answer questions, help with tasks, and keep the conversation fun and engaging.
    Keep your responses concise and appropriate for a Discord server.

command-names:
  # First entry is the display name shown in the help embed, the rest are aliases.
  # All entries trigger the command equally.

  # Fun
  random:
    - "random"
  coin:
    - "coin"
  wheel:
    - "wheel"

  # Music
  play:
    - "play"
    - "p"
  pause:
    - "pause"
  resume:
    - "resume"
  stop:
    - "stop"
  leave:
    - "leave"
  skip:
    - "skip"
    - "s"
  playing:
    - "playing"
    - "np"
  replay:
    - "replay"
    - "repeat"
  seek:
    - "seek"
  volume:
    - "volume"
    - "v"

  # Queue
  queue:
    - "queue"
    - "q"
  shuffle:
    - "shuffle"
    - "mix"
  insert:
    - "insert"
    - "put"
  remove:
    - "remove"

  # General
  help:
    - "help"
    - "commands"